[package]
name = "app"
version = "0.1.0"
edition = "2021"

[lib]
name = "app"
crate-type = ["cdylib", "rlib"]
path = "src/lib.rs"

[dependencies]
protocol = { path = "../crates/protocol" }
ratatui = "0.26"
crossterm = "0.27"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[workspace]
