[workspace]
resolver = "2"
members = [
    "crates/protocol",
    "crates/app",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Rune Team"]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
protocol = { path = "crates/protocol" }
tokio = { version = "1", features = ["full"] }
