# Compilation speed optimizations

[build]
# Use all available CPU cores
jobs = -1

[target.aarch64-apple-darwin]
# macOS Apple Silicon: use standard ld64 linker with parallel mode
rustflags = [
    "-C", "link-arg=-undefined",
    "-C", "link-arg=dynamic_lookup",
    "-C", "link-args=-ObjC",
]

[target.x86_64-apple-darwin]
# macOS Intel: use standard ld64 linker
rustflags = [
    "-C", "link-arg=-undefined",
    "-C", "link-arg=dynamic_lookup",
    "-C", "link-args=-ObjC",
]

[env]
# sccache for fast incremental compilation (10-100x faster on cache hits)
RUSTC_WRAPPER = "sccache"
# sccache tmp directory for better performance
SCCACHE_DIR = "/tmp/sccache"
