# OpenAI provider metadata
key: openai
display_name: OpenAI
base_url: https://api.openai.com/v1
env_var: OPENAI_API_KEY
models:
  - name: gpt-4o
    cost_prompt: 5.0
    cost_completion: 15.0
    supports_vision: true
    tokenizer: o200k_base
    context_window: 128000
  - name: gpt-4o-mini
    cost_prompt: 0.15
    cost_completion: 0.6
    supports_vision: true
    tokenizer: o200k_base
    context_window: 128000
  - name: o3-mini
    cost_prompt: 1.1
    cost_completion: 4.4
    supports_thinking: true
    supports_system: false
    tokenizer: o200k_base
    context_window: 200000
  - name: o1
    cost_prompt: 15.0
    cost_completion: 60.0
    supports_thinking: true
    supports_vision: true
    supports_system: false
    tokenizer: o200k_base
    context_window: 200000
