[package]
name = "runie-cli"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[[bin]]
name = "runie"
path = "src/bin/rune.rs"
required-features = ["binary-runie"]

[[bin]]
name = "cargo-runie"
path = "src/bin/cargo_rune.rs"
required-features = ["binary-cargo"]

[lib]
name = "runie_cli"
path = "src/lib.rs"

[dependencies]
runie = { path = "../runie", default-features = false }
anyhow.workspace = true
clap.workspace = true
tracing-subscriber.workspace = true

# For cargo subcommand integration
pager = { version = "0.16", optional = true }

[features]
default = ["binary-runie"]
cargo-subcommand = ["pager", "binary-cargo"]
binary-runie = []
binary-cargo = []
