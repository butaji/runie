[package]
name = "runie-agent"
version.workspace = true
edition.workspace = true

[lib]
path = "src/lib.rs"

[dependencies]
runie-core.workspace = true
serde = { version = "1.0", features = ["derive"] }

[dependencies.tokio]
version = "1"
features = ["sync", "rt", "time"]
optional = true

[features]
default = []
tokio = ["dep:tokio"]
