# Extension system - unified plugin API for runie
#
# Extensions are isolated crates that plug into runie via this API.
# The TUI consumes extensions through a unified PluginRegistry.
#
# Extension types:
#   - Hooks: Pre/post action interceptors (on_event, pre_tool, post_tool)
#   - Plugins: Full-featured extensions with commands, UI, state
#   - Skills: Agent-capable extensions invoked by LLM
#   - MCP Servers: External processes communicating via JSON-RPC over stdio

[package]
name = "runie-ext"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true

[dependencies]
runie-core = { path = "../runie-core" }
runie-ext-macros = { path = "../runie-ext-macros" }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
thiserror = { workspace = true }
async-trait = { workspace = true }
futures = { workspace = true }
once_cell = { workspace = true }
reqwest = { workspace = true }
anyhow = { workspace = true }
toml = { workspace = true }
dirs = { workspace = true }

[dev-dependencies]
tokio-test = "0.4"
