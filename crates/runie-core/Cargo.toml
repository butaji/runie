[build-dependencies]
sha2 = "0.10"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[package]
name = "runie-core"
version.workspace = true
edition.workspace = true
build = "build.rs"

[lib]
path = "src/lib.rs"

[features]
default = []
mcp = []
# Enable migration from redb session files (can be disabled to reduce dependencies)
redb-migration = ["dep:redb"]

[dependencies]
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
rmcp.workspace = true
schemars.workspace = true

runie-protocol.workspace = true
anyhow.workspace = true
similar.workspace = true
diffy.workspace = true
dirs.workspace = true
base64.workspace = true
unicode-segmentation = "1.10"
toml.workspace = true
tokio.workspace = true
futures.workspace = true
pulldown-cmark.workspace = true
quick-xml.workspace = true
unicode-width.workspace = true
textwrap.workspace = true
notify = "7.0"
notify-debouncer-mini = "0.5"
regex = { workspace = true }
glob.workspace = true
shellexpand.workspace = true
sublime_fuzzy.workspace = true
strum = { version = "0.26", features = ["derive"] }
fff-search.workspace = true
git2.workspace = true
reqwest = { workspace = true, features = ["blocking"] }
tempfile.workspace = true
tracing = "0.1"

[target.'cfg(unix)'.dependencies]
crossterm.workspace = true
nix.workspace = true
uuid = { version = "1", features = ["v4"] }
async-trait.workspace = true
ractor.workspace = true
redb = { version = "2", optional = true }


[dev-dependencies]
tempfile.workspace = true
criterion = "0.5"
runie-macros.workspace = true

[[bench]]
name = "snapshot"
harness = false

[[example]]
name = "write_config_schema"
