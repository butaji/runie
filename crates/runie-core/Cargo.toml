[package]
name = "runie-core"
version.workspace = true
edition.workspace = true
build = "build.rs"

[lib]
path = "src/lib.rs"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json.workspace = true
anyhow.workspace = true
dirs.workspace = true
base64 = "0.22"
unicode-segmentation = "1.10"
toml = "0.8"
tokio.workspace = true
futures.workspace = true

[dev-dependencies]
tempfile = "3"
criterion = "0.5"

[[bench]]
name = "snapshot"
harness = false
