[package]
name = "runie-core"
version.workspace = true
edition.workspace = true
license.workspace = true
build = "build.rs"

[lints]
workspace = true

[lib]
path = "src/lib.rs"

[build-dependencies]
sha2 = "0.10"
hex = "0.4"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[features]
default = []
# Enable migration from redb session files (can be disabled to reduce dependencies)
redb-migration = ["dep:redb"]

[dependencies]
serde.workspace = true
serde_json.workspace = true
serde_yaml.workspace = true
rmcp.workspace = true
schemars.workspace = true
jsonschema.workspace = true
anyhow.workspace = true
thiserror.workspace = true
similar.workspace = true
diffy.workspace = true
dirs.workspace = true
base64.workspace = true
unicode-segmentation.workspace = true
toml.workspace = true
tokio.workspace = true
futures.workspace = true
pulldown-cmark.workspace = true
pulldown-cmark-frontmatter.workspace = true
quick-xml.workspace = true
unicode-width.workspace = true
textwrap.workspace = true
notify.workspace = true
notify-debouncer-mini.workspace = true
regex.workspace = true
glob.workspace = true
shellexpand.workspace = true
shell-words.workspace = true
sublime_fuzzy.workspace = true
strum.workspace = true
fff-search.workspace = true
git2.workspace = true
reqwest = { workspace = true, features = ["blocking"] }
tempfile.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
keyring.workspace = true
secrecy.workspace = true
dotenvy.workspace = true
fs2.workspace = true
indextree.workspace = true
runie-util.workspace = true
bytesize.workspace = true
humantime.workspace = true
crokey.workspace = true
tokio-util.workspace = true

[target.'cfg(unix)'.dependencies]
crossterm.workspace = true
nix.workspace = true
uuid = { version = "1", features = ["v4"] }
async-trait.workspace = true
ractor.workspace = true
parking_lot.workspace = true
redb = { version = "2", optional = true }

[dev-dependencies]
tempfile.workspace = true
criterion = "0.5"

[[bench]]
name = "snapshot"
harness = false

[[example]]
name = "write_config_schema"
