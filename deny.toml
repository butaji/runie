# Cargo-deny configuration for Runie workspace
# See https://embarkstudios.github.io/cargo-deny/ for documentation

[advisories]
# Only check workspace crates for unmaintained status
unmaintained = "workspace"
# Check unsound crates in all crates (will warn, not deny, for transitive issues)
unsound = "workspace"
# Ignore RUSTSEC until we audit
ignore = [
    # git2 has unsound advisories; waiting for fff-search to update
    { id = "RUSTSEC-2026-0183" },
    { id = "RUSTSEC-2026-0184" },
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "CC0-1.0",
    "Zlib",
    "Unicode-3.0",
    "ISC",
    "MPL-2.0",
    "BSL-1.0",
]
confidence-threshold = 0.8
# Crates without license fields (use MIT as default)
exceptions = [
    { crate = "sublime_fuzzy@0.7.0", allow = ["MIT"] },
]

[bans]
# Only warn about multiple versions
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
# Allow all crates in the dependency tree for now
allow = []

# Skip the entire dependency tree for crates we don't control
skip-tree = [
    { crate = "fff-search", reason = "external dependency with its own tree" },
]

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
