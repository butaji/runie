# Cargo-deny configuration for Runie workspace
# See https://embarkstudios.github.io/cargo-deny/ for documentation

[advisories]
# Only check workspace crates for unmaintained status
unmaintained = "workspace"
# Check unsound crates in all crates (will warn, not deny, for transitive issues)
unsound = "workspace"
# Ignore RUSTSEC until we audit. Each entry MUST carry a reason and a review
# date; re-audit by 2026-09-30 and remove once git2 / quick-xml are bumped.
ignore = [
    # git2 has unsound advisories; waiting for fff-search to update
    { id = "RUSTSEC-2026-0183", reason = "git2 unsound; blocked on fff-search upgrade. Review by 2026-09-30." },
    { id = "RUSTSEC-2026-0184", reason = "git2 unsound; blocked on fff-search upgrade. Review by 2026-09-30." },

    # quick-xml 0.39.4 from syntect (via tui-markdown) has DoS vulnerabilities
    # Upgrade requires updating syntect/tui-markdown dependencies
    { id = "RUSTSEC-2026-0194", reason = "quick-xml 0.39.4 DoS via syntect/tui-markdown; upgrade pending upstream. Review by 2026-09-30." },
    { id = "RUSTSEC-2026-0195", reason = "quick-xml 0.39.4 DoS via syntect/tui-markdown; upgrade pending upstream. Review by 2026-09-30." },
]

[licenses]
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "CC0-1.0",
    "Zlib",
    "Unicode-3.0",
    "ISC",
    "MPL-2.0",
    "BSL-1.0",
    "LGPL-3.0-or-later",
    "CDLA-Permissive-2.0",
]

# Exceptions for crates with non-standard or missing license fields
[[licenses.clarify]]
name = "sublime_fuzzy"
expression = "MIT OR BSD-3-Clause"
license-files = [{ path = "LICENSE", hash = 0x0 }]

[bans]
# Deny multiple versions of the same crate
multiple-versions = "deny"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
# Allow known duplicates that cannot be resolved due to transitive dependency constraints.
# These skips document the root causes and can be revisited when upstream deps update.
skip = [
    # pulldown-cmark-frontmatter 0.4.0 requires pulldown-cmark 0.12.x
    { crate = "pulldown-cmark@0.12", reason = "pulldown-cmark-frontmatter 0.4 requires 0.12.x" },

    # structopt 0.3 (required by jsonschema 0.7) uses clap 2.x
    { crate = "clap@2", reason = "structopt from jsonschema 0.7 requires clap 2.x" },

    # dashmap 5.5.3 (from ractor 0.9) requires hashbrown 0.14.x
    { crate = "hashbrown@0.14", reason = "dashmap from ractor 0.9 requires 0.14.x" },
    { crate = "hashbrown@0.16", reason = "transitive dependency conflict between different dep versions" },

    # ractor 0.9 depends on dashmap which depends on older hashbrown/ahash
    { crate = "ahash@0.7", reason = "dashmap from ractor 0.9 requires ahash 0.7.x" },

    # syn 2.x vs 1.x from different transitive deps
    { crate = "syn@1", reason = "transitive dependency conflict between serde and proc-macro2" },

    # thiserror 1.x vs 2.x from different transitive deps
    { crate = "thiserror@1", reason = "transitive dependency conflict, minor version difference" },
    { crate = "thiserror-impl@1", reason = "transitive dependency conflict, minor version difference" },

    # toml 0.8.x vs 1.x from different transitive deps
    { crate = "toml@0.8", reason = "transitive dependency conflict, minor version difference" },
    { crate = "toml_datetime@0.6", reason = "transitive dependency conflict, minor version difference" },
    { crate = "toml_edit@0.22", reason = "transitive dependency conflict, minor version difference" },

    # textwrap 0.16 vs 0.18 from different transitive deps
    { crate = "textwrap@0.16", reason = "transitive dependency conflict, minor version difference" },

    # quick-xml 0.37.x vs 0.39.x from different transitive deps
    { crate = "quick-xml@0.37", reason = "transitive dependency conflict, minor version difference" },

    # itertools 0.14 from different transitive deps
    { crate = "itertools@0.14", reason = "transitive dependency conflict, minor version difference" },

    # strum has multiple minor versions due to transitive dependencies
    { crate = "strum@0.26", reason = "transitive dependency conflict, minor version difference" },
    { crate = "strum@0.27", reason = "transitive dependency conflict, minor version difference" },
    { crate = "strum_macros@0.26", reason = "transitive dependency conflict, minor version difference" },
    { crate = "strum_macros@0.27", reason = "transitive dependency conflict, minor version difference" },

    # r-efi has multiple minor versions
    { crate = "r-efi@5", reason = "transitive dependency conflict, minor version difference" },

    # strsim has multiple minor versions
    { crate = "strsim@0.8", reason = "transitive dependency conflict, minor version difference" },

    # getrandom has multiple major versions due to different platform requirements
    { crate = "getrandom@0.2", reason = "getrandom 0.2 required by older transitive deps" },
    { crate = "getrandom@0.4", reason = "getrandom 0.4 required by hashbrown/metrics" },

    # bitflags 1.x vs 2.x from different transitive deps
    { crate = "bitflags@1", reason = "clap 2.x from structopt requires bitflags 1.x" },

    # heck 0.3 vs 0.5 from different transitive deps
    { crate = "heck@0.3", reason = "transitive dependency conflict, minor version difference" },

    # dirs has two major versions due to different transitive deps
    { crate = "dirs@5", reason = "dirs 5 required by older transitive deps" },
    { crate = "dirs@6", reason = "dirs 6 required by shellexpand" },

    # dirs-sys has two versions
    { crate = "dirs-sys@0.4", reason = "transitive dependency conflict" },

    # redox_users has two versions
    { crate = "redox_users@0.5", reason = "transitive dependency conflict" },

    # reqwest has two versions due to transitive deps
    { crate = "reqwest@0.12", reason = "reqwest 0.12 required by wiremock" },
    { crate = "reqwest@0.13", reason = "reqwest 0.13 required by newer transitive deps" },

    # winnow 0.7 vs 1.0 from different transitive deps
    { crate = "winnow@0.7", reason = "toml_edit 0.22 requires winnow 0.7.x" },

    # Windows-specific crates have multiple versions for different API levels
    { crate = "windows-sys@0.48", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows-sys@0.52", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows-sys@0.60", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows-sys@0.61", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows-targets@0.48", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows-targets@0.52", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows-targets@0.53", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_aarch64_gnullvm@0.48", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_aarch64_gnullvm@0.52", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_aarch64_msvc@0.48", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_aarch64_msvc@0.52", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_i686_gnu@0.48", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_i686_gnu@0.52", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_i686_gnu@0.53", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_i686_gnullvm@0.52", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_i686_gnullvm@0.53", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_i686_msvc@0.48", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_i686_msvc@0.52", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_x86_64_gnu@0.48", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_x86_64_gnu@0.52", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_x86_64_gnu@0.53", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_x86_64_gnullvm@0.48", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_x86_64_gnullvm@0.52", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_x86_64_msvc@0.48", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_x86_64_msvc@0.52", reason = "different Windows API levels required by transitive deps" },
    { crate = "windows_x86_64_msvc@0.53", reason = "different Windows API levels required by transitive deps" },

    # darling multiple versions from derive_builder/validator vs tui-popup vs ratatui ecosystem
    { crate = "darling@0.20", reason = "derive_builder 0.20 requires darling 0.20.x" },
    { crate = "darling@0.21", reason = "tui-popup requires darling 0.21.x" },
    { crate = "darling@0.23", reason = "ratatui ecosystem requires darling 0.23.x" },
    { crate = "darling_core@0.20", reason = "derive_builder 0.20 requires darling_core 0.20.x" },
    { crate = "darling_core@0.21", reason = "tui-popup requires darling_core 0.21.x" },
    { crate = "darling_core@0.23", reason = "ratatui ecosystem requires darling_core 0.23.x" },
    { crate = "darling_macro@0.20", reason = "derive_builder 0.20 requires darling_macro 0.20.x" },
    { crate = "darling_macro@0.21", reason = "tui-popup requires darling_macro 0.21.x" },
    { crate = "darling_macro@0.23", reason = "ratatui ecosystem requires darling_macro 0.23.x" },

    # quick-xml 0.39.4 vulnerable to RUSTSEC-2026-0194 and RUSTSEC-2026-0195
    # Required by plist -> syntect (tui-markdown dependency)
    { crate = "quick-xml@0.39", reason = "syntect requires quick-xml 0.39.x, upgrade pending upstream fix" },

    # nix 0.27 from command-group vs 0.31 from rmcp/process-wrap
    { crate = "nix@0.27", reason = "command-group requires nix 0.27.x" },

    # Platform-specific crates
    { crate = "core-foundation@0.9", reason = "different macOS API levels required by transitive deps" },
    { crate = "nom@7", reason = "transitive dependency conflict, minor version difference" },
    { crate = "openssl-probe@0.1", reason = "transitive dependency conflict, minor version difference" },
    { crate = "serde_spanned@0.6", reason = "transitive dependency conflict, minor version difference" },
    { crate = "unicode-width@0.1", reason = "transitive dependency conflict, minor version difference" },
]

# Skip the entire dependency tree for crates we don't control
skip-tree = [
    # fff-search is an optional dependency - not currently in the lock file
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
