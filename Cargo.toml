[workspace]
resolver = "2"
members = [
    "crates/rune",
    "crates/rune-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Rune Team"]
license = "MIT"

[workspace.dependencies]
# SWC for parsing
swc_common = "0.33"
swc_ecma_parser = "0.146"
swc_ecma_ast = "0.111"
swc_ecma_codegen = "0.151"
swc_ecma_visit = "0.98"
swc_span = "0.18"
swc_atoms = "0.6"

# Error handling
miette = "7.2"
thiserror = "1"
anyhow = "1"

# Async and utilities
tokio = { version = "1", features = ["full"] }
futures = "0.3"
notify = "6"
libloading = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
parking_lot = "0.12"
once_cell = "1"
tempfile = "3"
walkdir = "2"
regex = "1"
itoa = "1"
ryu = "1"

# CLI
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Clippy lints
clippy_utils = "0.1"
