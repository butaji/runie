[workspace]
members = ["crates/runie-core", "crates/runie-engine", "crates/runie-tui", "crates/runie-agent", "crates/runie-provider", "crates/runie-print", "crates/runie-json", "crates/runie-server", "crates/runie-testing", "crates/runie-protocol", "crates/runie-macros"]
resolver = "2"

[workspace.package]
version = "0.2.16"
edition = "2021"

[workspace.dependencies]
ratatui = { version = "0.30", features = ["crossterm", "unstable-rendered-line-info"] }
crossterm = { version = "0.29", features = ["event-stream", "events"] }

rexpect = "0.6"
tokio = { version = "1", features = ["sync", "rt-multi-thread", "time", "macros"] }
futures = "0.3"
anyhow = "1.0"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
toml = "0.8"
dirs = "5.0"
nix = { version = "0.31", features = ["signal"] }
base64 = "0.22"
pulldown-cmark = "0.13"
redb = "2"
fff-search = "0.9.5-nightly.ec57eb0"
git2 = { version = "0.20.2", features = ["vendored-libgit2"], default-features = false }
unicode-width = "0.2"
textwrap = { version = "0.16", features = ["unicode-linebreak"] }
nucleo-matcher = "0.3"
similar = "3"
tracing = "0.1"
parking_lot = "0.12"
palette = "0.7"
insta = "1.41"
tempfile = "3"

runie-core = { path = "crates/runie-core" }
runie-engine = { path = "crates/runie-engine" }
runie-tui = { path = "crates/runie-tui" }
runie-agent = { path = "crates/runie-agent" }
runie-provider = { path = "crates/runie-provider" }
runie-protocol = { path = "crates/runie-protocol" }
runie-macros = { path = "crates/runie-macros" }
