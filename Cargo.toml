[workspace]
resolver = "2"
members = [
    "crates/protocol",
    "crates/host",
    "crates/app",
    "crates/runie",
    "crates/runie-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Runie Team"]
license = "MIT"

[workspace.dependencies]
thiserror = "1"
anyhow = "1"
swc_common = "=21.0.2"
swc_ecma_parser = "=38.0.2"
swc_ecma_ast = "=23.0.1"
tokio = { version = "1", features = ["full"] }
notify = "6"
libloading = "0.8"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
walkdir = "2"
toml = "0.8"
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
ctrlc = "3"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
