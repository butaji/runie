[workspace]
members = ["crates/runie-core", "crates/runie-tui", "crates/runie-term", "crates/runie-agent", "crates/runie-provider", "crates/runie-print", "crates/runie-json", "crates/runie-server"]
resolver = "2"

[workspace.package]
version = "0.2.16"
edition = "2021"

[workspace.dependencies]
ratatui = "0.30"
crossterm = { version = "0.29", features = ["event-stream"] }
ctrlc = "3.0"
rexpect = "0.6"
tokio = { version = "1", features = ["sync", "rt-multi-thread", "time", "macros"] }
futures = "0.3"
anyhow = "1.0"
reqwest = { version = "0.12", features = ["json", "stream"] }
serde_json = "1.0"
toml = "0.8"
dirs = "5.0"
nix = { version = "0.31", features = ["signal"] }

runie-core = { path = "crates/runie-core" }
runie-tui = { path = "crates/runie-tui" }
runie-agent = { path = "crates/runie-agent" }
runie-provider = { path = "crates/runie-provider" }
