[workspace]
members = [
    "crates/runie-core",
    "crates/runie-ai",
    "crates/runie-agent",
    "crates/runie-tools",
    "crates/runie-tui",
    "crates/runie-router",
    "crates/runie-orchestrator",
    "crates/runie-cli",
    "harness",
    "pantry",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["Tidy Team"]
license = "MIT"
repository = "https://github.com/tidy/harness"
rust-version = "1.80"

[workspace.dependencies]
tokio = { version = "1.40", features = ["rt-multi-thread", "sync", "time", "process", "fs", "macros", "io-util"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
async-trait = "0.1"
futures = "0.3"
thiserror = "1.0"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1.10", features = ["v4", "serde"] }
anyhow = "1.0"
reqwest = { version = "0.12", features = ["json", "stream"] }
async-stream = "0.3"
clap = { version = "4.5", features = ["derive"] }
crossterm = "0.29"
walkdir = "2.5"
tempfile = "3.13"
ratatui = "0.30"
tui-pantry = "0.4"
rand = "0.8"
regex = "1.10"
