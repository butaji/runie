[workspace]
members = ["crates/runie-agent", "crates/runie-tui"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
tokio = { version = "1.40", features = ["rt-multi-thread", "sync", "time", "macros", "io-util"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
async-trait = "0.1"
thiserror = "1.0"
futures = "0.3"
ratatui = "0.30"
crossterm = "0.29"
