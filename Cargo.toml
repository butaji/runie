[workspace]
members = ["crates/runie-core", "crates/runie-tui", "crates/runie-term"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
ratatui = "0.30"
crossterm = "0.29"
serde = { version = "1.0", features = ["derive"] }
bincode = "1.3"
ctrlc = "3.0"

runie-core = { path = "crates/runie-core" }
runie-tui = { path = "crates/runie-tui" }
