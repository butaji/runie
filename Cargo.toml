[workspace]
members = ["crates/runie-core", "crates/runie-tui", "crates/runie-term", "crates/runie-agent", "crates/runie-provider"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"

[workspace.dependencies]
ratatui = "0.30"
crossterm = { version = "0.29", features = ["event-stream"] }
ctrlc = "3.0"
tokio = { version = "1", features = ["sync", "rt-multi-thread", "time", "macros"] }
futures = "0.3"

runie-core = { path = "crates/runie-core" }
runie-tui = { path = "crates/runie-tui" }
runie-agent = { path = "crates/runie-agent" }
runie-provider = { path = "crates/runie-provider" }
