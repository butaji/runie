name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Setup Rust
        uses: ./.github/actions/rust-setup

      - name: Run tests
        run: |
          echo "=== Running all tests ==="
          ./scripts/verify-tests.sh

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Setup Rust
        uses: ./.github/actions/rust-setup

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Setup Rust
        uses: ./.github/actions/rust-setup

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - name: Setup Rust
        uses: ./.github/actions/rust-setup

      - name: Build TUI binary
        run: cargo build -p runie-tui --bin runie

      - name: Run TUI e2e-style tests
        run: cargo test -p runie-tui toggle_e2e
