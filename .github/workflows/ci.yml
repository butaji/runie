name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  # Expected test counts per crate (update when adding/removing tests)
  EXPECTED_RUNIE_AGENT_TESTS: 102
  EXPECTED_RUNIE_CORE_TESTS: 659
  EXPECTED_RUNIE_JSON_TESTS: 3
  EXPECTED_RUNIE_PRINT_TESTS: 2
  EXPECTED_RUNIE_PROVIDER_TESTS: 34
  EXPECTED_RUNIE_SERVER_TESTS: 3
  EXPECTED_RUNIE_TERM_TESTS: 117
  EXPECTED_RUNIE_TUI_TESTS: 92
  # Total expected: 1012 tests
  EXPECTED_TOTAL_TESTS: 1012

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: List tests
        run: |
          echo "=== Listing all tests ==="
          cargo test -- --list 2>&1 | tee test_list.txt
          TEST_COUNT=$(grep "test$" test_list.txt | wc -l)
          echo ""
          echo "=== Test count: $TEST_COUNT ==="

      - name: Verify test count
        run: |
          TEST_COUNT=$(grep "test$" test_list.txt | wc -l)
          echo "Found $TEST_COUNT tests (expected: ${{ env.EXPECTED_TOTAL_TESTS }})"
          
          # Assert test count is greater than 0 (at least 100 tests per requirement)
          if [ "$TEST_COUNT" -lt 100 ]; then
            echo "ERROR: Test count ($TEST_COUNT) is below minimum threshold (100)"
            exit 1
          fi
          
          # Warn if count differs from expected (but don't fail - tests may have been added/removed)
          if [ "$TEST_COUNT" -ne ${{ env.EXPECTED_TOTAL_TESTS }} ]; then
            echo "WARNING: Test count ($TEST_COUNT) differs from expected (${{ env.EXPECTED_TOTAL_TESTS }})"
            echo "Update EXPECTED_TOTAL_TESTS in ci.yml if this is intentional"
          fi

      - name: Run tests
        run: |
          echo "=== Running all tests ==="
          cargo test 2>&1 | tee test_output.txt

      - name: Verify test results
        run: |
          echo "=== Verifying test results ==="
          
          # Check for test failures
          if grep -q "FAILED" test_output.txt; then
            echo "ERROR: Some tests failed!"
            grep "FAILED" test_output.txt
            exit 1
          fi
          
          # Check for panics
          if grep -q "panicked at" test_output.txt; then
            echo "ERROR: Test panic detected!"
            grep "panicked at" test_output.txt
            exit 1
          fi
          
          # Extract and verify passed test count
          PASSED=$(grep "test result:" test_output.txt | grep -oE "[0-9]+ passed" | awk '{sum+=$1} END {print sum}')
          RUNNING=$(grep "^running [0-9]* test" test_output.txt | awk '{sum+=$2} END {print sum}')
          
          echo "Tests running: $RUNNING"
          echo "Tests passed: $PASSED"
          
          if [ "$PASSED" -eq 0 ]; then
            echo "ERROR: No tests passed!"
            exit 1
          fi
          
          if [ "$PASSED" -lt 100 ]; then
            echo "ERROR: Passed test count ($PASSED) is below minimum threshold (100)"
            exit 1
          fi
          
          if [ "$PASSED" -ne "$RUNNING" ]; then
            echo "ERROR: Not all tests passed ($PASSED/$RUNNING)"
            exit 1
          fi
          
          echo ""
          echo "=== All tests passed! ==="
          echo "Total tests: $PASSED"

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Build release binary
        run: cargo build --release

      - name: Run smoke tests
        run: bash tests/smoke/run_all.sh

      - name: Verify smoke test results
        run: |
          if ! bash tests/smoke/run_all.sh 2>&1 | tee smoke_output.txt; then
            if grep -q "SKIP" smoke_output.txt; then
              echo "Smoke tests skipped (tmux not available)"
            else
              echo "ERROR: Smoke tests failed!"
              exit 1
            fi
          fi
