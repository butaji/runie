<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runie — Campaign Success</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;family=JetBrains+Mono:wght@400;700&amp;display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html,
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .page {
            width: 100%;
            height: 100%;
            background: #E8E8E8;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            width: 520px;
            height: 641px;
            border-radius: 16px;
            border: 4px solid #111716;
            overflow: hidden;
            background: #111716;
            display: flex;
            flex-direction: column;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.14), 0 16px 40px rgba(0, 0, 0, 0.10), 0 6px 12px rgba(0, 0, 0, 0.06);
        }

        .top-row {
            display: grid;
            grid-template-columns: 3fr 1fr;
            gap: 4px;
            background: #111716;
            flex: 0 0 24.3%;
        }

        .runie-panel {
            background: #EDEDED;
            display: flex;
            align-items: center;
            padding: 2rem 2.25rem;
            border-radius: 10px;
        }

        .runie-text {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 5rem;
            color: #3C3C3C;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .runie-dot {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 5rem;
            color: #EF5102;
            letter-spacing: -0.02em;
            line-height: 1;
            margin-left: -2px;
        }

        .metal-panel {
            border-radius: 10px;
            background: conic-gradient(from 180deg at 50% 50%, #A8A49E 0deg, #F0EEEB 55deg, #94908A 110deg, #D5D2CD 165deg, #7E7A74 220deg, #B8B4AE 275deg, #C8C5C0 330deg, #A8A49E 360deg);
        }

        .divider {
            height: 4px;
            background: #111716;
            flex-shrink: 0;
        }

        .bottom-row {
            display: grid;
            grid-template-columns: minmax(0, 0.75fr) minmax(0, 3fr);
            gap: 4px;
            background: #111716;
            flex: 1;
        }

        .orange-panel {
            background: #EF5102;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border-radius: 10px;
        }

        .stripes {
            height: 28%;
            min-height: 100px;
            flex-shrink: 0;
            background: repeating-linear-gradient(-45deg, #1C1C1E, #1C1C1E 4px, #EF5102 4px, #EF5102 10px);
        }

        .metric-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .vertical-text {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.5rem;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            transform: rotate(180deg);
            letter-spacing: 0.05em;
            text-transform: uppercase;
            line-height: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .ts-line {
            color: #1C1C1E;
        }

        .rust-line {
            color: #1C1C1E;
        }

        .metric-number {
            font-family: 'Inter', sans-serif;
            font-weight: 300;
            font-size: 5rem;
            color: #1C1C1E;
            line-height: 0.9;
            letter-spacing: -0.04em;
        }

        .percent-circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1C1C1E;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 14px;
        }

        .percent-text {
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 1rem;
            color: #EF5102;
        }

        .content-panel {
            background: #F0F0F0;
            display: flex;
            flex-direction: column;
            padding: 1.75rem 2rem 2.25rem;
            border-radius: 10px;
        }

        .nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .nav-arrow {
            font-size: 1.1rem;
            color: #1C1C1E;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            transition: color 0.2s;
            user-select: none;
        }

        .nav-arrow:hover {
            color: #C4661F;
        }

        .nav-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8125rem;
            color: #1C1C1E;
        }

        .nav-label span:first-child {
            font-weight: 400;
        }

        .nav-label span:last-child {
            font-weight: 700;
        }

        .heading {
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 2.5rem;
            color: #020202;
            line-height: 1.15;
            letter-spacing: -0.02em;
            margin: 0;
        }

        .description {
            font-family: 'Inter', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            color: #A9A9A9;
            line-height: 1.5;
            margin-top: 1rem;
            max-width: 260px;
        }

        .code-block {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #1C1C1E;
            background: #E8E8E8;
            padding: 1rem 1.25rem;
            border-radius: 8px;
            margin-top: auto;
            line-height: 1.6;
            white-space: pre;
            overflow: hidden;
        }

        .code-block .keyword {
            color: #EF5102;
            font-weight: 700;
        }

        .code-block .type {
            color: #1C1C1E;
            font-weight: 700;
        }

        .code-block .fn {
            color: #3C3C3C;
        }

        .code-block .string {
            color: #6B7280;
        }

        .code-block .num {
            color: #6B7280;
        }

        @media (max-width: 560px) {
            .card {
                transform: scale(0.7);
            }
        }

        @media (max-height: 720px) {
            .card {
                transform: scale(0.76);
            }
        }

        @media (max-width: 560px) and(max-height: 720px) {
            .card {
                transform: scale(0.6);
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <div class="card">
            <div class="top-row">
                <div class="runie-panel">
                    <span class="runie-text">
                        Runie<span class="runie-dot">.</span>
                    </span>
                </div>
                <div class="metal-panel"></div>
            </div>
            <div class="divider"></div>
            <div class="bottom-row">
                <div class="orange-panel">
                    <div class="stripes"></div>
                    <div class="metric-area">
                        <div class="vertical-text">
                            <span class="ts-line">TYPESCRIPT & TSX</span>
                            <span class="rust-line">RUST PERFORMANCE</span>
                        </div>
                    </div>
                </div>
                <div class="content-panel">
                    <div class="nav-row">
                        <span class="nav-arrow" id="prev-arrow">←</span>
                        <span class="nav-label">
                            <span id="framework-label">framework: </span>
                            <span id="framework-name">Ratatui</span>
                        </span>
                        <span class="nav-arrow" id="next-arrow">→</span>
                    </div>
                    <pre class="code-block" id="code-example"></pre>
                </div>
            </div>
        </div>
    </div>

    <script>
        const examples = [
            {
                framework: 'Ratatui',
                label: 'framework: ',
                code: '<span class="keyword">function</span> <span class="type">App</span>() {\n  <span class="keyword">const</span> tasks = <span class="fn">useState</span>(<span class="type">Task</span>[])([]);\n\n  <span class="keyword">return</span> (\n    <span class="type">&lt;Layout></span>\n      <span class="type">&lt;Header></span>Task Manager<span class="type">&lt;/Header></span>\n      <span class="type">&lt;List></span>\n        {tasks.<span class="fn">map</span>(t => (\n          <span class="type">&lt;ListItem></span>\n            {t.done ? <span class="string">"[x]"</span> : <span class="string">"[ ]"</span>} {t.title}\n          <span class="type">&lt;/ListItem></span>\n        ))}\n      <span class="type">&lt;/List></span>\n    <span class="type">&lt;/Layout></span>\n  );\n}'
            },
            {
                framework: 'Axum',
                label: 'framework: ',
                code: '<span class="keyword">const</span> router = <span class="type">Router</span>.<span class="fn">new</span>()\n  .<span class="fn">route</span>(<span class="string">"/tasks"</span>, {\n    <span class="fn">get</span>: listTasks,\n    <span class="fn">post</span>: createTask\n  })\n  .<span class="fn">layer</span>(TraceLayer.<span class="fn">new</span>())\n  .<span class="fn">with_state</span>(state);'
            },
            {
                framework: 'Dioxus',
                label: 'framework: ',
                code: '<span class="keyword">const</span> tasks = <span class="fn">useSignal</span>&lt;<span class="type">Task</span>[]&gt;([]);\n<span class="keyword">const</span> filter = <span class="fn">useSignal</span>(<span class="string">"all"</span>);\n\n<span class="keyword">const</span> visible = <span class="fn">useMemo</span>(() => {\n  <span class="keyword">return</span> tasks().<span class="fn">filter</span>(t => {\n    <span class="keyword">if</span> (filter() === <span class="string">"active"</span>) <span class="keyword">return</span> !t.done;\n  });\n});'
            },
            {
                framework: 'SQLx',
                label: 'framework: ',
                code: '<span class="keyword">const</span> pool = <span class="keyword">await</span> <span class="type">PgPool</span>.<span class="fn">connect</span>(url);\n\n<span class="keyword">const</span> rows = <span class="keyword">await</span> <span class="fn">sqlx</span>.<span class="fn">queryAs</span>&lt;<span class="type">Task</span>&gt;(\n  pool,\n  <span class="string">"SELECT * FROM tasks WHERE done = false"</span>\n);'
            },
            {
                framework: 'Bevy',
                label: 'framework: ',
                code: '<span class="type">App</span>.<span class="fn">new</span>()\n  .<span class="fn">addPlugins</span>(DefaultPlugins)\n  .<span class="fn">insertResource</span>({ score: <span class="num">0</span> })\n  .<span class="fn">addSystem</span>(update)\n  .<span class="fn">run</span>();'
            },
            {
                framework: 'Candle',
                label: 'framework: ',
                code: '<span class="keyword">const</span> tokens = tokenizer.<span class="fn">encode</span>(prompt);\n\n<span class="keyword">for</span> (<span class="keyword">let</span> i = <span class="num">0</span>; i < maxLen; i++) {\n  <span class="keyword">const</span> logits = <span class="fn">forward</span>(model, tokens);\n  <span class="keyword">const</span> next = logits.<span class="fn">argmax</span>(1);\n  <span class="keyword">if</span> (next === eosId) <span class="keyword">break</span>;\n}'
            }
        ];

        let currentIndex = 0;

        function slugify(str) {
            return str.toLowerCase().replace(/[^a-z0-9]+/g, '-');
        }

        function updateExample() {
            const example = examples[currentIndex];
            document.getElementById('framework-name').textContent = example.framework;
            document.getElementById('code-example').innerHTML = example.code;
            location.hash = slugify(example.framework);
        }

        function fromHash() {
            const hash = location.hash.replace('#', '');
            if (!hash) return 0;
            const idx = examples.findIndex(e => slugify(e.framework) === hash);
            return idx >= 0 ? idx : 0;
        }

        document.getElementById('prev-arrow').addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + examples.length) % examples.length;
            updateExample();
        });

        document.getElementById('next-arrow').addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % examples.length;
            updateExample();
        });

        window.addEventListener('hashchange', () => {
            currentIndex = fromHash();
            const example = examples[currentIndex];
            document.getElementById('framework-name').textContent = example.framework;
            document.getElementById('code-example').innerHTML = example.code;
        });

        currentIndex = fromHash();
        updateExample();
    </script>

</body>

</html>
