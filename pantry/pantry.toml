[config]
name = "Anvil TUI Pantry"
description = "Widget development environment for Anvil coding harness"
version = "0.1.0"

[pantry.dark]
accent = "#5ccfe6"
panel_bg = "#252525"
cursor_bg = "#2a2a2a"
border = "#404040"
border_dim = "#333333"
text = "#e0e0e0"
text_dim = "#808080"
doc_accent = "#5ccfe6"
doc_text = "#e0e0e0"
doc_type = "#c792ea"
indicator = "#5ccfe6"
dark = true

[pantry.light]
accent = "#007acc"
panel_bg = "#f5f5f5"
cursor_bg = "#e8e8e8"
border = "#d0d0d0"
border_dim = "#e0e0e0"
text = "#333333"
text_dim = "#666666"
doc_accent = "#007acc"
doc_text = "#333333"
doc_type = "#6b4c9a"
indicator = "#007acc"
dark = false
